name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: arduino/setup-protoc@v3
        with:
          version: '27.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2

      - name: Verify the tag matches Cargo.toml version
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          ver="$(sed -n -E 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n1)"
          echo "tag=$tag  cargo=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $ver" >&2
            exit 1
          fi

      - name: cargo publish --dry-run
        run: cargo publish --dry-run --allow-dirty

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN_TCHAT }}
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
